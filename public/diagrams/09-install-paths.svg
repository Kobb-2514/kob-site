<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ip-title ip-desc" font-family="'Itim', 'Comic Sans MS', 'Marker Felt', 'Sukhumvit Set', 'Sarabun', 'Tahoma', cursive, sans-serif" style="background:#ffffff;">
  <title id="ip-title">DrugBox — 3 ช่องทางดาวน์โหลดและติดตั้ง</title>
  <desc id="ip-desc">DrugBox มี 3 ทางเข้าใช้งาน: iPhone ดาวน์โหลดจาก App Store, Android ติดตั้ง PWA จาก Chrome, Desktop ใช้ผ่าน browser หรือติดตั้งเป็นแอปได้</desc>
  <defs>
    <filter id="ip-rough" x="-2%" y="-2%" width="104%" height="104%"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="13" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5"/></filter>
    <filter id="ip-rough-light" x="-2%" y="-2%" width="104%" height="104%"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="9" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"/></filter>
  </defs>

  <!-- Header -->
  <g transform="translate(60, 60)">
    <text font-size="32" font-weight="800" fill="#1a202c"><tspan>ดาวน์โหลด · ติดตั้ง ·</tspan> <tspan fill="#0d9488">3 ช่องทาง</tspan></text>
    <rect x="-4" y="14" width="112" height="14" fill="#fde68a" filter="url(#ip-rough)" opacity="0.8"/>
    <text y="32" font-size="13" fill="#94a3b8" font-style="italic">Three install paths — iPhone, Android, Desktop</text>
    <text y="58" font-size="14" fill="#475569" font-style="italic">ใช้บนอุปกรณ์ไหนก็ได้ ข้อมูลเดียวกัน sync ผ่านบัญชีเดียวกัน</text>
  </g>

  <!-- Rx app icon -->
  <g transform="translate(1100, 70)" filter="url(#ip-rough-light)">
    <rect x="-30" y="-30" width="60" height="60" rx="12" fill="#1e3a8a" stroke="#1a202c" stroke-width="2"/>
    <rect x="-17" y="-7" width="34" height="24" rx="2" fill="#ffffff"/>
    <path d="M -8 -7 L -8 -12 Q -8 -15 -5 -15 L 5 -15 Q 8 -15 8 -12 L 8 -7" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="11" text-anchor="middle" font-size="17" font-weight="900" font-style="italic" fill="#1e3a8a" font-family="Georgia, serif">Rx</text>
  </g>

  <!-- ====== Column 1: iPhone Native (App Store) ====== -->
  <g transform="translate(70, 160)">
    <!-- Header card -->
    <rect x="0" y="0" width="340" height="80" rx="14" fill="#ccfbf1" stroke="#1a202c" stroke-width="2.5" filter="url(#ip-rough)"/>
    <text x="170" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#1a202c">📱 iPhone · Native App</text>
    <text x="170" y="54" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">App Store — แนะนำสุดสำหรับ iPhone</text>
    <text x="170" y="72" text-anchor="middle" font-size="11" fill="#0f766e" font-weight="700">push notification · scan QR · เร็วกว่า web</text>

    <!-- iPhone mockup -->
    <g transform="translate(125, 110)" filter="url(#ip-rough-light)">
      <rect x="0" y="0" width="90" height="160" rx="14" fill="#f1f5f9" stroke="#1a202c" stroke-width="2"/>
      <rect x="6" y="20" width="78" height="115" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <circle cx="45" cy="10" r="4" fill="#1a202c" opacity="0.2"/>
      <!-- Rx icon inside phone -->
      <rect x="32" y="50" width="26" height="26" rx="6" fill="#1e3a8a" stroke="#1a202c" stroke-width="1.2"/>
      <text x="45" y="69" text-anchor="middle" font-size="12" font-weight="900" font-style="italic" fill="#ffffff" font-family="Georgia, serif">Rx</text>
      <text x="45" y="92" text-anchor="middle" font-size="8" font-weight="800" fill="#1a202c">DrugBox</text>
    </g>

    <!-- Steps -->
    <g transform="translate(0, 290)">
      <g transform="translate(0, 0)"><circle cx="20" cy="20" r="14" fill="#0d9488" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">1</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">เปิด App Store</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">บน iPhone / iPad</text></g>
      <g transform="translate(0, 50)"><circle cx="20" cy="20" r="14" fill="#0d9488" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">2</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">ค้นหา "DrugBox Care"</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">ฟรี · ไม่มี IAP</text></g>
      <g transform="translate(0, 100)"><circle cx="20" cy="20" r="14" fill="#0d9488" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">3</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">กด Get → ติดตั้ง</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">เข้าใช้งาน → Sign in / สมัคร</text></g>
    </g>
  </g>

  <!-- ====== Column 2: Android (PWA via Chrome) ====== -->
  <g transform="translate(430, 160)">
    <!-- Header card -->
    <rect x="0" y="0" width="340" height="80" rx="14" fill="#dbeafe" stroke="#1a202c" stroke-width="2.5" filter="url(#ip-rough)"/>
    <text x="170" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#1a202c">🤖 Android · PWA</text>
    <text x="170" y="54" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">Chrome → Install — เป็นแอปบนหน้าจอจริงๆ</text>
    <text x="170" y="72" text-anchor="middle" font-size="11" fill="#1e40af" font-weight="700">ไม่ต้อง store · push notification ใช้ได้</text>

    <!-- Android phone mockup -->
    <g transform="translate(125, 110)" filter="url(#ip-rough-light)">
      <rect x="0" y="0" width="90" height="160" rx="14" fill="#f1f5f9" stroke="#1a202c" stroke-width="2"/>
      <rect x="6" y="14" width="78" height="118" rx="3" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <circle cx="45" cy="146" r="6" fill="#1a202c" opacity="0.15" stroke="#1a202c" stroke-width="1"/>
      <!-- Chrome address bar hint -->
      <rect x="10" y="20" width="70" height="10" rx="3" fill="#e0e7ff" stroke="#cbd5e1" stroke-width="0.8"/>
      <text x="45" y="28" text-anchor="middle" font-size="6" fill="#475569">drugboxcare.com</text>
      <!-- Rx icon in browser -->
      <rect x="32" y="55" width="26" height="26" rx="6" fill="#1e3a8a" stroke="#1a202c" stroke-width="1.2"/>
      <text x="45" y="74" text-anchor="middle" font-size="12" font-weight="900" font-style="italic" fill="#ffffff" font-family="Georgia, serif">Rx</text>
      <text x="45" y="97" text-anchor="middle" font-size="8" font-weight="800" fill="#1a202c">DrugBox</text>
      <text x="45" y="115" text-anchor="middle" font-size="6" fill="#94a3b8" font-style="italic">PWA</text>
    </g>

    <!-- Steps -->
    <g transform="translate(0, 290)">
      <g transform="translate(0, 0)"><circle cx="20" cy="20" r="14" fill="#3b82f6" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">1</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">เปิด drugboxcare.com</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">ใน Chrome (Android)</text></g>
      <g transform="translate(0, 50)"><circle cx="20" cy="20" r="14" fill="#3b82f6" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">2</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">เมนู ⋮ → "Install app"</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">หรือกด banner "ติดตั้ง" ที่ขึ้นมา</text></g>
      <g transform="translate(0, 100)"><circle cx="20" cy="20" r="14" fill="#3b82f6" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">3</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">ไอคอน DrugBox บน home</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">เปิดเหมือนแอปทั่วไป · ไม่มี browser bar</text></g>
    </g>
  </g>

  <!-- ====== Column 3: Desktop (Web / PWA) ====== -->
  <g transform="translate(790, 160)">
    <!-- Header card -->
    <rect x="0" y="0" width="340" height="80" rx="14" fill="#fef3c7" stroke="#1a202c" stroke-width="2.5" filter="url(#ip-rough)"/>
    <text x="170" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#1a202c">💻 Desktop · Web</text>
    <text x="170" y="54" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">drugboxcare.com — เปิดใน browser ได้เลย</text>
    <text x="170" y="72" text-anchor="middle" font-size="11" fill="#92400e" font-weight="700">จอใหญ่ดู report · จัดการ org สะดวก</text>

    <!-- Laptop mockup -->
    <g transform="translate(85, 130)" filter="url(#ip-rough-light)">
      <rect x="0" y="0" width="170" height="110" rx="6" fill="#f1f5f9" stroke="#1a202c" stroke-width="2"/>
      <rect x="8" y="8" width="154" height="94" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Browser tabs -->
      <rect x="12" y="12" width="80" height="10" rx="2" fill="#e0e7ff"/>
      <text x="52" y="20" text-anchor="middle" font-size="7" fill="#475569">drugboxcare.com</text>
      <!-- Page content hint -->
      <rect x="14" y="28" width="146" height="6" rx="1" fill="#ccfbf1"/>
      <rect x="14" y="38" width="100" height="4" rx="1" fill="#cbd5e1"/>
      <rect x="14" y="46" width="146" height="4" rx="1" fill="#cbd5e1"/>
      <!-- Mini Rx icon -->
      <rect x="14" y="58" width="20" height="20" rx="4" fill="#1e3a8a" stroke="#1a202c" stroke-width="0.8"/>
      <text x="24" y="73" text-anchor="middle" font-size="10" font-weight="900" font-style="italic" fill="#ffffff" font-family="Georgia, serif">Rx</text>
      <rect x="40" y="62" width="60" height="4" rx="1" fill="#475569"/>
      <rect x="40" y="70" width="80" height="4" rx="1" fill="#cbd5e1"/>
      <!-- Laptop base -->
      <path d="M -10 110 L 180 110 L 175 116 L -5 116 Z" fill="#cbd5e1" stroke="#1a202c" stroke-width="1.6"/>
    </g>

    <!-- Steps -->
    <g transform="translate(0, 290)">
      <g transform="translate(0, 0)"><circle cx="20" cy="20" r="14" fill="#f59e0b" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">1</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">เปิด drugboxcare.com</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">Chrome / Edge / Safari บน Mac/Win</text></g>
      <g transform="translate(0, 50)"><circle cx="20" cy="20" r="14" fill="#f59e0b" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">2</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">Sign in / สมัคร — ใช้ได้เลย</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">ใช้แค่ browser · ไม่ต้องติดตั้ง</text></g>
      <g transform="translate(0, 100)"><circle cx="20" cy="20" r="14" fill="#f59e0b" stroke="#1a202c" stroke-width="1.6"/><text x="20" y="25" text-anchor="middle" font-size="13" font-weight="900" fill="#ffffff">3</text><text x="44" y="18" font-size="13" font-weight="700" fill="#1a202c">(เลือก) กด ⊕ ที่ address bar → Install</text><text x="44" y="32" font-size="10" fill="#64748b" font-style="italic">เปิดได้จาก Dock / Start menu</text></g>
    </g>
  </g>

  <!-- Bottom note: iPhone PWA fallback -->
  <g transform="translate(60, 660)">
    <rect x="0" y="0" width="1080" height="68" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4,3" filter="url(#ip-rough-light)"/>
    <text x="20" y="26" font-size="14" font-weight="800" fill="#1a202c">ℹ️ iPhone — ใช้ web ก็ได้ ไม่ต้องติดตั้ง app</text>
    <text x="20" y="46" font-size="11.5" fill="#475569">เปิด drugboxcare.com ใน Safari → Share → "Add to Home Screen" → ใช้แบบ PWA ก็ได้ (แต่ push notification จำกัดกว่า native iOS app)</text>
    <text x="20" y="60" font-size="10" fill="#94a3b8" font-style="italic">ถ้าใช้กล่องยาบ่อย แนะนำ App Store version เพื่อ notification + scan QR ที่เร็วกว่า</text>
  </g>

  <!-- Footer -->
  <text x="1160" y="745" text-anchor="end" font-size="11" font-style="italic" fill="#94a3b8">DrugBox · by adisak_kob · drugboxcare.com</text>
</svg>
