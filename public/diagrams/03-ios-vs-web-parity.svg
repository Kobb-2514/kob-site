<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="parf-title parf-desc" font-family="'Itim', 'Comic Sans MS', 'Marker Felt', 'Sukhumvit Set', 'Sarabun', 'Tahoma', cursive, sans-serif" style="background:#ffffff;">
  <title id="parf-title">DrugBox iOS vs Web — เทียบความสามารถ</title>
  <desc id="parf-desc">เปรียบเทียบฟีเจอร์ระหว่าง iOS กับ Web</desc>
  <defs>
    <filter id="parf-rough" x="-2%" y="-2%" width="104%" height="104%"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="4" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5"/></filter>
    <filter id="parf-rough-light" x="-2%" y="-2%" width="104%" height="104%"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="2" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"/></filter>
  </defs>
  <g transform="translate(50, 70)">
    <text font-size="32" font-weight="800" fill="#1a202c">iOS <tspan font-size="26" fill="#94a3b8">vs</tspan> Web — <tspan fill="#0d9488">ระบบเดียว</tspan> สองที่ใช้</text>
    <rect x="263" y="14" width="125" height="14" fill="#fde68a" filter="url(#parf-rough)" opacity="0.8"/>
    <text y="32" font-size="13" fill="#94a3b8" font-style="italic">two clients, one app</text>
    <text y="58" font-size="14" fill="#475569" font-style="italic">ฟีเจอร์ส่วนใหญ่เท่ากัน · มีไม่กี่อันที่เฉพาะแพลตฟอร์ม</text>
  </g>
  <g transform="translate(1100, 75)" filter="url(#parf-rough-light)">
    <rect x="-30" y="-30" width="60" height="60" rx="12" fill="#1e3a8a" stroke="#1a202c" stroke-width="2"/>
    <rect x="-17" y="-7" width="34" height="24" rx="2" fill="#ffffff"/>
    <path d="M -8 -7 L -8 -12 Q -8 -15 -5 -15 L 5 -15 Q 8 -15 8 -12 L 8 -7" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="11" text-anchor="middle" font-size="17" font-weight="900" font-style="italic" fill="#1e3a8a" font-family="Georgia, serif">Rx</text>
    <circle cx="22" cy="-22" r="9" fill="#ef4444" stroke="#1a202c" stroke-width="1"/>
  </g>
  <g transform="translate(0, 175)">
    <text x="80" y="0" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1.5">ฟีเจอร์ · FEATURE</text>
    <g transform="translate(620, -30)"><rect x="0" y="0" width="160" height="50" rx="10" fill="#dbeafe" stroke="#1a202c" stroke-width="2" filter="url(#parf-rough)"/><text x="80" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1a202c">📱 iOS App</text><text x="80" y="40" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">v1.2 Build 12</text></g>
    <g transform="translate(820, -30)"><rect x="0" y="0" width="160" height="50" rx="10" fill="#ccfbf1" stroke="#1a202c" stroke-width="2" filter="url(#parf-rough)"/><text x="80" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1a202c">💻 เว็บ</text><text x="80" y="40" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">drugboxcare.com</text></g>
  </g>
  <g transform="translate(0, 215)" font-size="13" fill="#1a202c">
    <g><text x="80" y="20">📧 เข้าสู่ระบบด้วยอีเมล / รหัสผ่าน</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 40)"><text x="80" y="20">🍎 เข้าสู่ระบบด้วย Apple <tspan font-size="10" fill="#94a3b8" font-style="italic">(v1.2)</tspan></text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#94a3b8">—</text></g>
    <g transform="translate(0, 80)"><text x="80" y="20">🌐 เข้าสู่ระบบด้วย Google <tspan font-size="10" fill="#94a3b8" font-style="italic">(v1.2)</tspan></text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#94a3b8">—</text></g>
    <g transform="translate(0, 120)"><text x="80" y="20">📦 จัดการกล่องยา (เพิ่ม/แก้/ลบ)</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 160)"><text x="80" y="20">🔄 สลับ · รับคืน · จ่ายกล่อง</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 200)"><text x="80" y="20">✓ ตรวจกล่อง / round-aware</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 240)"><text x="80" y="20">📷 สแกน QR code</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#94a3b8">—</text></g>
    <g transform="translate(0, 280)"><text x="80" y="20">📋 นำเข้า CSV (ยา · กล่อง)</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#94a3b8">—</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 320)"><text x="80" y="20">📊 สถิติ + dot grid</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 360)"><text x="80" y="20">📄 รายงาน — Export PDF</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 400)"><text x="80" y="20">👥 จัดการสมาชิก (admin)</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 440)"><text x="80" y="20">📋 บันทึกประวัติ / audit log</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
    <g transform="translate(0, 480)"><text x="80" y="20">🔔 Push notification</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="20" font-weight="700" fill="#16a34a">✓ <tspan font-size="10" fill="#94a3b8" font-style="italic">(PWA)</tspan></text></g>
    <g transform="translate(0, 520)"><text x="80" y="20">🗑️ ลบบัญชี (PDPA)</text><text x="700" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="900" y="20" text-anchor="middle" font-size="22" font-weight="900" fill="#16a34a">✓</text></g>
  </g>
  <g stroke="#1a202c" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.3" filter="url(#parf-rough-light)"><line x1="700" y1="225" x2="700" y2="725"/><line x1="900" y1="225" x2="900" y2="725"/></g>
  <g transform="translate(60, 720)" font-size="11" fill="#475569">
    <text x="0" y="0" font-size="22" font-weight="900" fill="#16a34a">✓</text><text x="22" y="-5" font-style="italic">ใช้งานได้</text>
    <text x="120" y="0" font-size="22" font-weight="900" fill="#94a3b8">—</text><text x="142" y="-5" font-style="italic">ไม่มีบนแพลตฟอร์มนี้</text>
    <text x="320" y="-5" font-style="italic" fill="#94a3b8">user ที่สมัครจาก iOS ด้วย Apple/Google → เข้าเว็บครั้งแรกใช้ "ลืมรหัสผ่าน"</text>
  </g>
  <text x="1160" y="745" text-anchor="end" font-size="11" font-style="italic" fill="#94a3b8">DrugBox · by adisak_kob · drugboxcare.com</text>
</svg>
