<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bmf-title bmf-desc" font-family="'Itim', 'Comic Sans MS', 'Marker Felt', 'Sukhumvit Set', 'Sarabun', 'Tahoma', cursive, sans-serif" style="background:#ffffff;">
  <title id="bmf-title">DrugBox — ขั้นตอน Box Movement (หัวใจของแอป)</title>
  <desc id="bmf-desc">เภสัชกรกดปุ่มสลับกล่อง เลือกรูปแบบ เลือกกล่อง บันทึกยาที่ใช้ไป ปลายทาง บันทึก แล้ว Cloud Function จัดการ</desc>
  <defs>
    <filter id="bmf-rough" x="-2%" y="-2%" width="104%" height="104%"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="4" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5"/></filter>
    <filter id="bmf-rough-light" x="-2%" y="-2%" width="104%" height="104%"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="2" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"/></filter>
    <marker id="bmf-arrow" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="11" markerHeight="11" orient="auto"><path d="M0,1 L13,7 L0,13 L4,7 z" fill="#1a202c"/></marker>
  </defs>
  <g transform="translate(50, 65)">
    <text font-size="32" font-weight="800" fill="#1a202c"><tspan fill="#ea580c">หัวใจของแอป</tspan> · ขั้นตอน Box Movement</text>
    <text y="32" font-size="14" fill="#94a3b8" font-style="italic">Heart-of-app workflow — what happens when a pharmacist swaps a drug box</text>
    <text y="58" font-size="14" fill="#475569" font-style="italic">เภสัชกรกดสลับกล่อง 1 ครั้ง → ระบบทำงานเบื้องหลังและจบที่การตรวจรอบ</text>
  </g>
  <g transform="translate(1100, 70)" filter="url(#bmf-rough-light)">
    <rect x="-30" y="-30" width="60" height="60" rx="12" fill="#1e3a8a" stroke="#1a202c" stroke-width="2"/>
    <rect x="-17" y="-7" width="34" height="24" rx="2" fill="#ffffff"/>
    <path d="M -8 -7 L -8 -12 Q -8 -15 -5 -15 L 5 -15 Q 8 -15 8 -12 L 8 -7" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="11" text-anchor="middle" font-size="17" font-weight="900" font-style="italic" fill="#1e3a8a" font-family="Georgia, serif">Rx</text>
    <circle cx="22" cy="-22" r="9" fill="#ef4444" stroke="#1a202c" stroke-width="1"/>
  </g>
  <g transform="translate(60, 175)">
    <g><rect x="0" y="0" width="150" height="100" rx="14" fill="#ffd9b3" stroke="#1a202c" stroke-width="2" filter="url(#bmf-rough)"/><circle cx="75" cy="-12" r="13" fill="#fff" stroke="#1a202c" stroke-width="1.8" filter="url(#bmf-rough)"/><text x="75" y="-7" text-anchor="middle" font-size="14" font-weight="900" fill="#1a202c">1</text><text x="75" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">📦 แตะปุ่มส้ม</text><text x="75" y="48" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">"เปลี่ยนกล่อง" 🔄</text><text x="75" y="72" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">บนหน้ารายการกล่องยา</text><text x="75" y="88" text-anchor="middle" font-size="9" fill="#94a3b8">toolbar button</text></g>
    <g transform="translate(170, 0)"><rect x="0" y="0" width="160" height="100" rx="14" fill="#fef9c3" stroke="#1a202c" stroke-width="2" filter="url(#bmf-rough)"/><circle cx="80" cy="-12" r="13" fill="#fff" stroke="#1a202c" stroke-width="1.8" filter="url(#bmf-rough)"/><text x="80" y="-7" text-anchor="middle" font-size="14" font-weight="900" fill="#1a202c">2</text><text x="80" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">เลือกรูปแบบ</text><text x="80" y="50" text-anchor="middle" font-size="10" fill="#475569">🔁 สลับ (ใช้บ่อยสุด)</text><text x="80" y="66" text-anchor="middle" font-size="10" fill="#475569">⬅️ รับคืนเฉยๆ</text><text x="80" y="82" text-anchor="middle" font-size="10" fill="#475569">➡️ จ่ายเฉยๆ</text></g>
    <g transform="translate(350, 0)"><rect x="0" y="0" width="160" height="100" rx="14" fill="#e9d5ff" stroke="#1a202c" stroke-width="2" filter="url(#bmf-rough)"/><circle cx="80" cy="-12" r="13" fill="#fff" stroke="#1a202c" stroke-width="1.8" filter="url(#bmf-rough)"/><text x="80" y="-7" text-anchor="middle" font-size="14" font-weight="900" fill="#1a202c">3</text><text x="80" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">เลือกกล่อง A / B</text><text x="80" y="50" text-anchor="middle" font-size="10" fill="#9a3412" font-style="italic">A = รับคืน (ส้ม)</text><text x="80" y="66" text-anchor="middle" font-size="10" fill="#0d9488" font-style="italic">B = จ่ายออก (เขียว)</text><text x="80" y="84" text-anchor="middle" font-size="9" fill="#94a3b8">สลับ: filter ประเภทเดียวกัน</text></g>
    <g transform="translate(530, 0)"><rect x="0" y="0" width="180" height="100" rx="14" fill="#fde68a" stroke="#1a202c" stroke-width="2.5" filter="url(#bmf-rough)"/><circle cx="90" cy="-12" r="13" fill="#fff" stroke="#1a202c" stroke-width="1.8" filter="url(#bmf-rough)"/><text x="90" y="-7" text-anchor="middle" font-size="14" font-weight="900" fill="#1a202c">4</text><g transform="translate(155, -16)"><rect x="-22" y="-7" width="44" height="14" rx="7" fill="#ef4444" stroke="#1a202c" stroke-width="1" filter="url(#bmf-rough-light)"/><text x="0" y="3" text-anchor="middle" font-size="9" font-weight="900" fill="#ffffff">NEW</text></g><text x="90" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">📋 ยาที่ใช้ไป</text><text x="90" y="44" text-anchor="middle" font-size="10" fill="#92400e" font-style="italic">(ไม่บังคับ · optional)</text><text x="90" y="62" text-anchor="middle" font-size="10" fill="#475569">เภสัชกรเลือกยา + จำนวน</text><text x="90" y="76" text-anchor="middle" font-size="10" fill="#475569">ตามที่พยาบาลแจ้ง</text><text x="90" y="92" text-anchor="middle" font-size="9" fill="#94a3b8" font-style="italic">แทนกระดาษโน้ตในกล่อง</text></g>
    <g transform="translate(730, 0)"><rect x="0" y="0" width="160" height="100" rx="14" fill="#bfdbfe" stroke="#1a202c" stroke-width="2" filter="url(#bmf-rough)"/><circle cx="80" cy="-12" r="13" fill="#fff" stroke="#1a202c" stroke-width="1.8" filter="url(#bmf-rough)"/><text x="80" y="-7" text-anchor="middle" font-size="14" font-weight="900" fill="#1a202c">5</text><text x="80" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">📍 ปลายทาง</text><text x="80" y="50" text-anchor="middle" font-size="10" fill="#475569">รับคืน: ห้องยาย่อย</text><text x="80" y="66" text-anchor="middle" font-size="10" fill="#475569">จ่าย: ER / OR / ICU</text><text x="80" y="84" text-anchor="middle" font-size="9" fill="#94a3b8">มี preview ขึ้นทันที</text></g>
    <g transform="translate(910, 0)"><rect x="0" y="0" width="160" height="100" rx="14" fill="#bbf7d0" stroke="#1a202c" stroke-width="2.5" filter="url(#bmf-rough)"/><circle cx="80" cy="-12" r="13" fill="#fff" stroke="#1a202c" stroke-width="1.8" filter="url(#bmf-rough)"/><text x="80" y="-7" text-anchor="middle" font-size="14" font-weight="900" fill="#1a202c">6</text><text x="80" y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#1a202c">💾 บันทึก</text><text x="80" y="54" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">เขียน /boxMovements/{id}</text><text x="80" y="74" text-anchor="middle" font-size="10" fill="#475569" font-style="italic">เข้า Firestore</text></g>
