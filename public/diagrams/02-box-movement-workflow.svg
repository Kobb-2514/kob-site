    <g transform="translate(240, 0)"><rect x="0" y="0" width="190" height="90" rx="14" fill="#bbf7d0" stroke="#1a202c" stroke-width="2" filter="url(#bmf-rough)"/><circle cx="95" cy="-12" r="13" fill="#fff" stroke="#1a202c" stroke-width="1.8" filter="url(#bmf-rough)"/><text x="95" y="-7" text-anchor="middle" font-size="14" font-weight="900" fill="#1a202c">9</text><text x="95" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1a202c">✓ ตรวจกล่อง</text><text x="95" y="54" text-anchor="middle" font-size="11" fill="#475569" font-style="italic">Update → ตรวจกล่อง → บันทึก</text><text x="95" y="72" text-anchor="middle" font-size="9" fill="#94a3b8">log ฝัง summary ยาที่ใช้ไป</text></g>
