<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="abf-title abf-desc" font-family="'Itim', 'Comic Sans MS', 'Marker Felt', 'Sukhumvit Set', 'Sarabun', 'Tahoma', cursive, sans-serif" style="background:#ffffff;">
  <title id="abf-title">DrugBox — เพิ่มกล่องยา 2 วิธี (กรอกเอง vs Import CSV)</title>
  <desc id="abf-desc">การเพิ่มกล่องยาใหม่ ใช้ได้ 2 วิธี: กรอกข้อมูลเองทีละกล่องสำหรับเริ่มต้นใหม่ หรือ Import จาก CSV สำหรับลง bulk หลายกล่องในครั้งเดียว</desc>
  <defs>
    <filter id="abf-rough" x="-2%" y="-2%" width="104%" height="104%"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="7" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5"/></filter>
    <filter id="abf-rough-light" x="-2%" y="-2%" width="104%" height="104%"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="3" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"/></filter>
  </defs>

  <!-- Header -->
  <g transform="translate(60, 65)">
    <text font-size="32" font-weight="800" fill="#1a202c"><tspan>เพิ่มกล่องยาใหม่ ·</tspan> <tspan fill="#0d9488">2 วิธี</tspan></text>
    <rect x="-4" y="14" width="78" height="14" fill="#fde68a" filter="url(#abf-rough)" opacity="0.8"/>
    <text y="32" font-size="13" fill="#94a3b8" font-style="italic">Two ways to add drug boxes — manual or CSV import</text>
    <text y="58" font-size="14" fill="#475569" font-style="italic">เลือกตามสถานการณ์ — กล่องใหม่กรอกเองได้เลย ส่วนข้อมูลเก่ามีอยู่แล้วใช้ CSV เร็วกว่า</text>
  </g>

  <!-- Rx app icon -->
  <g transform="translate(1100, 70)" filter="url(#abf-rough-light)">
    <rect x="-30" y="-30" width="60" height="60" rx="12" fill="#1e3a8a" stroke="#1a202c" stroke-width="2"/>
    <rect x="-17" y="-7" width="34" height="24" rx="2" fill="#ffffff"/>
    <path d="M -8 -7 L -8 -12 Q -8 -15 -5 -15 L 5 -15 Q 8 -15 8 -12 L 8 -7" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
    <text x="0" y="11" text-anchor="middle" font-size="17" font-weight="900" font-style="italic" fill="#1e3a8a" font-family="Georgia, serif">Rx</text>
  </g>

  <!-- ============ Path A — Manual (left column) ============ -->

  <!-- A: Header card -->
  <g transform="translate(70, 160)">
    <rect x="0" y="0" width="510" height="80" rx="14" fill="#fef3c7" stroke="#1a202c" stroke-width="2.5" filter="url(#abf-rough)"/>
    <text x="255" y="32" text-anchor="middle" font-size="22" font-weight="800" fill="#1a202c">📝 กรอกข้อมูลเอง</text>
    <text x="255" y="56" text-anchor="middle" font-size="13" fill="#475569" font-style="italic">Manual entry — เพิ่มทีละกล่อง</text>
    <text x="255" y="73" text-anchor="middle" font-size="11" fill="#92400e">เหมาะกับ: รพ. เริ่มใช้ใหม่ / กล่องเดี่ยว</text>
  </g>

  <!-- A: Step 1 -->
  <g transform="translate(120, 280)">
    <circle cx="-32" cy="32" r="18" fill="#f59e0b" stroke="#1a202c" stroke-width="2" filter="url(#abf-rough-light)"/>
    <text x="-32" y="38" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">1</text>
    <rect x="0" y="0" width="380" height="64" rx="12" fill="#ffffff" stroke="#1a202c" stroke-width="1.8" filter="url(#abf-rough-light)"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#1a202c">ตั้งชื่อกล่อง + เลือกประเภท + ตำแหน่ง</text>
    <text x="20" y="48" font-size="11" fill="#64748b" font-style="italic">เช่น "CPR 1" · ER · ห้องฉุกเฉิน</text>
  </g>

  <!-- A: Step 2 -->
  <g transform="translate(120, 370)">
    <circle cx="-32" cy="32" r="18" fill="#f59e0b" stroke="#1a202c" stroke-width="2" filter="url(#abf-rough-light)"/>
    <text x="-32" y="38" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">2</text>
    <rect x="0" y="0" width="380" height="64" rx="12" fill="#ffffff" stroke="#1a202c" stroke-width="1.8" filter="url(#abf-rough-light)"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#1a202c">เพิ่มยาเข้ากล่องทีละรายการ</text>
    <text x="20" y="48" font-size="11" fill="#64748b" font-style="italic">ชื่อยา · จำนวน · หน่วย · วันหมดอายุ (ถ้ามี)</text>
  </g>

  <!-- A: Step 3 -->
  <g transform="translate(120, 460)">
    <circle cx="-32" cy="32" r="18" fill="#f59e0b" stroke="#1a202c" stroke-width="2" filter="url(#abf-rough-light)"/>
    <text x="-32" y="38" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">3</text>
    <rect x="0" y="0" width="380" height="64" rx="12" fill="#ffffff" stroke="#1a202c" stroke-width="1.8" filter="url(#abf-rough-light)"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#1a202c">กด "บันทึก" → 1 กล่องเสร็จ</text>
    <text x="20" y="48" font-size="11" fill="#64748b" font-style="italic">กล่องว่าง (ไม่มียา) ก็บันทึกได้ ค่อยเติมทีหลัง</text>
  </g>

  <!-- Vertical connectors A -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="280" y1="240" x2="280" y2="280" stroke-dasharray="3,4"/>
    <line x1="280" y1="344" x2="280" y2="370" stroke-dasharray="3,4"/>
    <line x1="280" y1="434" x2="280" y2="460" stroke-dasharray="3,4"/>
  </g>

  <!-- ============ Path B — CSV (right column) ============ -->

  <!-- B: Header card -->
  <g transform="translate(620, 160)">
    <rect x="0" y="0" width="510" height="80" rx="14" fill="#dbeafe" stroke="#1a202c" stroke-width="2.5" filter="url(#abf-rough)"/>
    <text x="255" y="32" text-anchor="middle" font-size="22" font-weight="800" fill="#1a202c">📥 Import จาก CSV</text>
    <text x="255" y="56" text-anchor="middle" font-size="13" fill="#475569" font-style="italic">Bulk import — หลายกล่อง+หลายยา ครั้งเดียว</text>
    <text x="255" y="73" text-anchor="middle" font-size="11" fill="#1e40af">เหมาะกับ: มีข้อมูลใน Excel/Sheet อยู่แล้ว</text>
  </g>

  <!-- B: Step 1 -->
  <g transform="translate(670, 280)">
    <circle cx="-32" cy="32" r="18" fill="#3b82f6" stroke="#1a202c" stroke-width="2" filter="url(#abf-rough-light)"/>
    <text x="-32" y="38" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">1</text>
    <rect x="0" y="0" width="380" height="64" rx="12" fill="#ffffff" stroke="#1a202c" stroke-width="1.8" filter="url(#abf-rough-light)"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#1a202c">ดาวน์โหลด template (Google Sheets)</text>
    <text x="20" y="48" font-size="11" fill="#64748b" font-style="italic">หรือดูตัวอย่างฟอร์แมตในแอป (7 columns)</text>
  </g>

  <!-- B: Step 2 -->
  <g transform="translate(670, 370)">
    <circle cx="-32" cy="32" r="18" fill="#3b82f6" stroke="#1a202c" stroke-width="2" filter="url(#abf-rough-light)"/>
    <text x="-32" y="38" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">2</text>
    <rect x="0" y="0" width="380" height="64" rx="12" fill="#ffffff" stroke="#1a202c" stroke-width="1.8" filter="url(#abf-rough-light)"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#1a202c">กรอกข้อมูล — 1 แถว = 1 ยา</text>
    <text x="20" y="48" font-size="11" fill="#64748b" font-style="italic">แถวที่มี boxName + type + location ซ้ำ → รวมเป็นกล่องเดียว</text>
  </g>

  <!-- B: Step 3 -->
  <g transform="translate(670, 460)">
    <circle cx="-32" cy="32" r="18" fill="#3b82f6" stroke="#1a202c" stroke-width="2" filter="url(#abf-rough-light)"/>
    <text x="-32" y="38" text-anchor="middle" font-size="16" font-weight="900" fill="#ffffff">3</text>
    <rect x="0" y="0" width="380" height="64" rx="12" fill="#ffffff" stroke="#1a202c" stroke-width="1.8" filter="url(#abf-rough-light)"/>
    <text x="20" y="28" font-size="15" font-weight="700" fill="#1a202c">Export .csv → อัพโหลดในแอป</text>
    <text x="20" y="48" font-size="11" fill="#64748b" font-style="italic">หลายกล่องสร้างพร้อมกัน → จบในครั้งเดียว</text>
  </g>

  <!-- Vertical connectors B -->
  <g stroke="#94a3b8" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="830" y1="240" x2="830" y2="280" stroke-dasharray="3,4"/>
    <line x1="830" y1="344" x2="830" y2="370" stroke-dasharray="3,4"/>
    <line x1="830" y1="434" x2="830" y2="460" stroke-dasharray="3,4"/>
  </g>

  <!-- ============ Convergence — both paths end here ============ -->

  <!-- Curved arrows down to the convergence -->
  <g stroke="#0d9488" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 280 540 Q 280 605 460 640" filter="url(#abf-rough-light)"/>
    <path d="M 830 540 Q 830 605 740 640"  filter="url(#abf-rough-light)"/>
    <!-- arrowheads -->
    <path d="M 460 640 L 450 632 M 460 640 L 452 648"/>
    <path d="M 740 640 L 750 632 M 740 640 L 748 648"/>
  </g>

  <!-- Final card -->
  <g transform="translate(330, 645)">
    <rect x="0" y="0" width="540" height="100" rx="16" fill="#bbf7d0" stroke="#1a202c" stroke-width="2.5" filter="url(#abf-rough)"/>
    <text x="270" y="36" text-anchor="middle" font-size="22" font-weight="900" fill="#1a202c">✅ กล่องพร้อมใช้งาน</text>
    <text x="270" y="60" text-anchor="middle" font-size="14" fill="#475569" font-style="italic">Box ready — every teammate sees it instantly via Firestore</text>
    <text x="270" y="82" text-anchor="middle" font-size="13" fill="#065f46">ทีมที่อยู่ใน org เดียวกันเห็นกล่องใหม่ทันที sync แบบ realtime</text>
  </g>

  <!-- Footer -->
  <text x="1160" y="800" text-anchor="end" font-size="11" font-style="italic" fill="#94a3b8">DrugBox · by adisak_kob · drugboxcare.com</text>
</svg>
